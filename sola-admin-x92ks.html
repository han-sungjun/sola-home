<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="더운정 마이힐스 관리자 페이지" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>더운정 마이힐스 관리자</title>
  <style>
    :root{--surface:rgba(255,255,255,.82);--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--primary:#0f172a;--accent:#ef4444;--blue:#2563eb;--danger:#dc2626;--shadow:0 20px 40px rgba(15,23,42,.08);--radius-xl:28px}
    *{box-sizing:border-box}html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%);color:var(--text)}body{max-width:480px;margin:0 auto}button,input,select,textarea{font:inherit}
    .app{min-height:100dvh;padding:16px 16px 110px}.shell{display:flex;flex-direction:column;gap:14px}.topbar{display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:12px}.brand .logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#fff;box-shadow:var(--shadow);font-size:22px}.brand h1{margin:0;font-size:24px;letter-spacing:-.05em}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.icon-btn{width:44px;height:44px;border:none;border-radius:16px;cursor:pointer;background:rgba(255,255,255,.8);box-shadow:var(--shadow);color:var(--text)}
    .hero{position:relative;overflow:hidden;padding:22px;border-radius:30px;color:#fff;background:radial-gradient(circle at top right,rgba(255,255,255,.28),transparent 30%),linear-gradient(135deg,#111827 0%,#1f2937 46%,#ef4444 100%);box-shadow:var(--shadow)}.hero::after{content:"";position:absolute;right:-26px;top:-12px;width:118px;height:118px;border-radius:34px;background:rgba(255,255,255,.14);transform:rotate(18deg)}.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.14);font-size:12px}.hero h2{margin:14px 0 8px;font-size:28px;line-height:1.18;letter-spacing:-.05em;max-width:280px}.hero p{margin:0;max-width:320px;line-height:1.55;color:rgba(255,255,255,.92)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.stat{padding:14px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(10px)}.stat strong{display:block;font-size:20px}.stat span{font-size:12px;color:rgba(255,255,255,.84)}
    .panel,.admin-card{background:var(--surface);border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow);backdrop-filter:blur(18px);border-radius:var(--radius-xl);padding:16px}.notice{padding:14px 16px;border-radius:18px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:13px;line-height:1.5}.hidden{display:none!important}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin:2px 2px 0}.section-head h3{margin:0;font-size:18px;letter-spacing:-.03em}.section-head small{color:var(--muted)}.admin-grid,.form-grid,.mini-list{display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#334155;font-weight:700}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:12px 14px;outline:none;background:#fff}.field textarea{min-height:82px;resize:vertical}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.check-row{display:flex;gap:18px;align-items:center;flex-wrap:wrap;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff}.check-row label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#334155;font-weight:700}
    .btn{border:none;border-radius:16px;padding:12px 14px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:var(--primary);color:#fff}.btn-soft{background:#fff;color:var(--text);border:1px solid var(--line)}.btn-blue{background:var(--blue);color:#fff}.btn-danger{background:#fee2e2;color:var(--danger)}
    .mini-item{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff}.mini-item-head{display:flex;justify-content:space-between;gap:10px;align-items:start}.mini-item h5{margin:0;font-size:15px}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.tag{padding:7px 10px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);color:#475569;font-size:12px}.tag.rec{background:#eff6ff;border-color:#bfdbfe;color:#2563eb;font-weight:700}.tag.hidden-tag{background:#fef2f2;border-color:#fecaca;color:#b91c1c;font-weight:700}.tag.live-tag{background:#ecfdf5;border-color:#bbf7d0;color:#15803d;font-weight:700}
    @media (max-width:370px){.stats,.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app"><div class="shell">
    <header class="topbar"><div class="brand"><div class="logo">🛠️</div><div><h1>더운정 마이힐스 관리자</h1><p>Firebase Authentication + Firestore</p></div></div><button class="icon-btn" onclick="location.href='/'" title="공개 페이지">⌂</button></header>
    <div class="hero"><div class="eyebrow">🔐 관리자 전용</div><h2>혜택 등록과 수정을 한 번에</h2><p>관리자는 로그인 후 Firestore에 실시간으로 혜택을 등록, 수정, 삭제할 수 있습니다.</p><div class="stats"><div class="stat"><strong id="statMax">0%</strong><span>최대 할인</span></div><div class="stat"><strong id="statCount">0</strong><span>전체 제휴</span></div><div class="stat"><strong id="statCat">0</strong><span>카테고리</span></div></div></div>
    <div class="panel notice hidden" id="firebaseNotice">Firebase 설정값이 비어 있습니다. firebaseConfig를 확인해 주세요.</div>
    <div class="admin-grid">
      <div class="admin-card"><div class="section-head" style="margin-bottom:12px;"><h3 style="font-size:16px;">관리자 로그인</h3><small id="authStatusText">로그인 필요</small></div><div class="form-grid"><div class="field"><label for="adminEmail">이메일</label><input id="adminEmail" type="email" placeholder="admin@example.com" /></div><div class="field"><label for="adminPassword">비밀번호</label><input id="adminPassword" type="password" placeholder="비밀번호 입력" /></div><div class="grid-2"><button class="btn btn-blue" type="button" id="loginBtn">로그인</button><button class="btn btn-soft" type="button" id="logoutBtn">로그아웃</button></div></div></div>
      <div class="admin-card"><div class="section-head" style="margin-bottom:12px;"><h3 style="font-size:16px;">혜택 등록 / 수정</h3><small id="formModeLabel">새 항목</small></div><form id="benefitForm" class="form-grid"><input type="hidden" id="editId" value="" /><div class="field"><label for="name">매장명</label><input id="name" required /></div><div class="grid-2"><div class="field"><label for="category">카테고리</label><input id="category" placeholder="예: 음식, 미용, 카페" required /></div><div class="field"><label for="discountText">혜택 표기</label><input id="discountText" placeholder="예: 10% 또는 서비스" required /></div></div><div class="grid-2"><div class="field"><label for="discountValue">할인 수치</label><input id="discountValue" type="number" min="0" placeholder="서비스면 0" required /></div><div class="field"><label for="serviceType">혜택 유형</label><select id="serviceType"><option value="discount">할인형</option><option value="service">서비스형</option></select></div></div><div class="field"><label>운영 옵션</label><div class="check-row"><label><input type="checkbox" id="visible" checked> 노출</label><label><input type="checkbox" id="recommended"> 추천</label></div></div><div class="field"><label for="condition">혜택 조건</label><textarea id="condition" required></textarea></div><div class="field"><label for="address">주소</label><input id="address" required /></div><div class="field"><label for="url">길찾기 URL</label><input id="url" placeholder="네이버 지도 또는 카카오 지도 URL" /></div><div class="field"><label for="phone">전화번호</label><input id="phone" required /></div><div class="grid-2"><button type="submit" class="btn btn-primary">저장</button><button type="button" class="btn btn-soft" id="cancelEditBtn">입력 초기화</button></div></form></div>
      <div class="admin-card"><div class="section-head" style="margin-bottom:12px;"><h3 style="font-size:16px;">데이터 관리</h3><small>Firestore 전체 내보내기</small></div><div class="grid-2"><button class="btn btn-soft" id="exportBtn" type="button">JSON 내보내기</button><button class="btn btn-soft" id="seedBtn" type="button">기본 데이터 업로드</button></div></div>
      <div class="admin-card"><div class="section-head" style="margin-bottom:12px;"><h3 style="font-size:16px;">등록된 혜택 목록</h3><small id="adminCount">0건</small></div><div class="mini-list" id="adminList"></div></div>
    </div>
  </div></div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs, onSnapshot, serverTimestamp, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    const firebaseConfig = { apiKey:"AIzaSyDhKr7oMSrLowJ47cqB4pvNXuIIdtW0HPI", authDomain:"sola-home-4979a.firebaseapp.com", projectId:"sola-home-4979a", storageBucket:"sola-home-4979a.firebasestorage.app", messagingSenderId:"337132471819", appId:"1:337132471819:web:848cd357fecda459a2e90e" };
    const BENEFITS_COLLECTION='benefits';
    const DEFAULT_BENEFITS=[{name:'엘스킨케어',category:'피부관리',discountValue:50,discountText:'50%',condition:'첫방문 50% / 입주민 정액권 최대 30%',address:'경기 파주시 경의로 1242 209호, 210호',phone:'0507-1433-5760',url:'',visible:true,recommended:true,service:false},{name:'미스터피자 일산탄현점',category:'음식',discountValue:30,discountText:'30%',condition:'포장 30% / 매장식사 20% + 샐러드 증정',address:'경기 고양시 일산서구 탄현로 136 상가동 2층 204호',phone:'031-911-9296',url:'',visible:true,recommended:true,service:false}];
    const state={benefits:[],isAdmin:false}; const qs=(s)=>document.querySelector(s);
    function sanitizeBenefit(item={},id=''){return {id,name:item.name||'',category:item.category||'기타',discountValue:Number(item.discountValue||0),discountText:item.discountText||`${Number(item.discountValue||0)}%`,condition:item.condition||'',address:item.address||'',url:item.url||'',phone:item.phone||'',service:!!item.service||String(item.discountText).trim()==='서비스',visible:item.visible!==false,recommended:!!item.recommended};}
    const hasFirebaseConfig=()=>firebaseConfig.apiKey&&firebaseConfig.projectId&&firebaseConfig.appId;
    let auth=null,db=null;
    function updateStats(){const items=state.benefits;qs('#statCount').textContent=items.length;qs('#statMax').textContent=`${Math.max(0,...items.map(v=>v.discountValue))}%`;qs('#statCat').textContent=new Set(items.map(v=>v.category)).size;qs('#adminCount').textContent=`${items.length}건`;}
    function resetForm(){qs('#benefitForm').reset();qs('#editId').value='';qs('#formModeLabel').textContent='새 항목';qs('#discountValue').value=0;qs('#serviceType').value='discount';qs('#visible').checked=true;qs('#recommended').checked=false;}
    function fillForm(item){qs('#editId').value=item.id;qs('#formModeLabel').textContent='수정 중';qs('#name').value=item.name;qs('#category').value=item.category;qs('#discountText').value=item.discountText;qs('#discountValue').value=item.discountValue;qs('#serviceType').value=item.service?'service':'discount';qs('#condition').value=item.condition;qs('#address').value=item.address;qs('#url').value=item.url||'';qs('#phone').value=item.phone;qs('#visible').checked=item.visible!==false;qs('#recommended').checked=!!item.recommended;window.scrollTo({top:0,behavior:'smooth'});}
    function renderAdminList(){const list=qs('#adminList');list.innerHTML='';if(!state.benefits.length){list.innerHTML='<div class="notice">등록된 항목이 없습니다.</div>';return;}const items=[...state.benefits].sort((a,b)=>a.name.localeCompare(b.name,'ko'));items.forEach(item=>{const el=document.createElement('div');el.className='mini-item';el.innerHTML=`<div class="mini-item-head"><div><h5>${item.name}</h5><div style="color:#64748b;font-size:13px;line-height:1.45;">${item.category} · ${item.discountText} · ${item.phone}</div><div class="tags">${item.recommended?'<span class="tag rec">추천</span>':''}${item.visible===false?'<span class="tag hidden-tag">비노출</span>':'<span class="tag live-tag">노출중</span>'}</div></div><div class="tags" style="margin-top:0;"><button class="btn btn-soft edit-btn" style="padding:8px 10px;">수정</button><button class="btn btn-danger del-btn" style="padding:8px 10px;">삭제</button></div></div>`;el.querySelector('.edit-btn').onclick=()=>fillForm(item);el.querySelector('.del-btn').onclick=()=>deleteBenefit(item.id,item.name);list.appendChild(el);});}
    async function saveBenefit(e){e.preventDefault();if(!state.isAdmin||!db){alert('관리자 로그인 후 저장할 수 있습니다.');return;}const payload={name:qs('#name').value.trim(),category:qs('#category').value.trim(),discountText:qs('#discountText').value.trim(),discountValue:Number(qs('#discountValue').value||0),condition:qs('#condition').value.trim(),address:qs('#address').value.trim(),url:qs('#url').value.trim(),phone:qs('#phone').value.trim(),service:qs('#serviceType').value==='service',visible:qs('#visible').checked,recommended:qs('#recommended').checked,updatedAt:serverTimestamp()};try{const editId=qs('#editId').value;if(editId){await updateDoc(doc(db,BENEFITS_COLLECTION,editId),payload);}else{await addDoc(collection(db,BENEFITS_COLLECTION),{...payload,createdAt:serverTimestamp()});}resetForm();alert('혜택 정보가 저장되었습니다.');}catch(e){console.error(e);alert('저장에 실패했습니다.');}}
    async function deleteBenefit(id,name){if(!state.isAdmin||!db){alert('관리자 로그인 후 삭제할 수 있습니다.');return;}if(!confirm(`"${name}" 항목을 삭제할까요?`))return;try{await deleteDoc(doc(db,BENEFITS_COLLECTION,id));}catch(e){console.error(e);alert('삭제에 실패했습니다.');}}
    async function loginAdmin(){if(!auth){alert('Firebase 설정을 확인해 주세요.');return;}const email=qs('#adminEmail').value.trim(),password=qs('#adminPassword').value;if(!email||!password){alert('이메일과 비밀번호를 입력해 주세요.');return;}try{await signInWithEmailAndPassword(auth,email,password);qs('#adminPassword').value='';alert('관리자 로그인에 성공했습니다.');}catch(e){console.error(e);alert('로그인에 실패했습니다.');}}
    const logoutAdmin=async()=>{if(auth) await signOut(auth);};
    const exportBenefits=async()=>{const blob=new Blob([JSON.stringify(state.benefits,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='myhills-benefits-firebase.json';a.click();URL.revokeObjectURL(a.href);};
    async function seedDefaultData(){if(!state.isAdmin||!db){alert('관리자 로그인 후 실행해 주세요.');return;}if(!confirm('기본 데이터를 Firestore에 업로드할까요? 기존 데이터와 중복될 수 있습니다.'))return;try{const snapshot=await getDocs(collection(db,BENEFITS_COLLECTION));if(!snapshot.empty){const keepGoing=confirm('이미 등록된 데이터가 있습니다. 그래도 추가 업로드할까요?');if(!keepGoing)return;}const batch=writeBatch(db);DEFAULT_BENEFITS.forEach(item=>{const ref=doc(collection(db,BENEFITS_COLLECTION));batch.set(ref,{...item,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});});await batch.commit();alert('기본 데이터 업로드가 완료되었습니다.');}catch(e){console.error(e);alert('기본 데이터 업로드에 실패했습니다.');}}
    function subscribeBenefits(){onSnapshot(collection(db,BENEFITS_COLLECTION),(snapshot)=>{state.benefits=snapshot.docs.map(d=>sanitizeBenefit(d.data(),d.id));updateStats();renderAdminList();},(e)=>console.error(e));}
    if(hasFirebaseConfig()){qs('#firebaseNotice').classList.add('hidden');const app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);onAuthStateChanged(auth,(user)=>{state.isAdmin=!!user;qs('#authStatusText').textContent=user?`로그인됨: ${user.email}`:'로그인 필요';});subscribeBenefits();}else{qs('#firebaseNotice').classList.remove('hidden');}
    qs('#benefitForm').addEventListener('submit',saveBenefit);qs('#cancelEditBtn').onclick=resetForm;qs('#loginBtn').onclick=loginAdmin;qs('#logoutBtn').onclick=logoutAdmin;qs('#exportBtn').onclick=exportBenefits;qs('#seedBtn').onclick=seedDefaultData;resetForm();
  </script>
</body>
</html>
