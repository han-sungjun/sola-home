<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="더운정 마이힐스 회원가입" />
  <title>더운정 마이힐스 - 회원가입</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --surface:rgba(255,255,255,.9);
      --line:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#0f172a;
      --accent:#ef4444;
      --accent2:#f59e0b;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 20px 40px rgba(15,23,42,.10);
      --radius-xl:28px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans","Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%);
      color:var(--text);
    }
    body{
      min-height:100dvh;
      padding:20px;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(100%,520px);
      padding-bottom:30px;
    }
    .hero{
      position:relative;
      overflow:hidden;
      padding:24px;
      border-radius:30px;
      color:#fff;
      background:
        radial-gradient(circle at top right,rgba(255,255,255,.28),transparent 30%),
        linear-gradient(135deg,#111827 0%,#1f2937 46%,#ef4444 100%);
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-26px;
      top:-12px;
      width:118px;
      height:118px;
      border-radius:34px;
      background:rgba(255,255,255,.14);
      transform:rotate(18deg);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      font-size:12px;
    }
    .hero h1{
      margin:14px 0 8px;
      font-size:28px;
      line-height:1.2;
      letter-spacing:-.05em;
    }
    .hero p{
      margin:0;
      line-height:1.7;
      color:rgba(255,255,255,.92);
      font-size:14px;
    }
    .panel{
      background:var(--surface);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      border-radius:var(--radius-xl);
      padding:20px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }
    .logo{
      width:52px;
      height:52px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:#fff;
      box-shadow:var(--shadow);
      font-size:24px;
      flex:0 0 auto;
    }
    .brand h2{
      margin:0;
      font-size:22px;
      letter-spacing:-.04em;
    }
    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }
    .field{
      display:grid;
      gap:8px;
      margin-bottom:14px;
    }
    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }
    .input,.textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:15px 16px;
      outline:none;
      font-size:15px;
      color:var(--text);
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .input:focus,.textarea:focus{
      border-color:#94a3b8;
      box-shadow:0 0 0 4px rgba(148,163,184,.16);
    }
    .textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.6;
    }
    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .helper{
      font-size:12px;
      color:var(--muted);
      line-height:1.55;
      margin-top:4px;
    }
    .upload-box{
      border:1.5px dashed #cbd5e1;
      border-radius:22px;
      padding:16px;
      background:#fff;
    }
    .upload-box:hover{
      border-color:#94a3b8;
    }
    .upload-meta{
      margin-top:10px;
      padding:12px 14px;
      border-radius:16px;
      background:#f8fafc;
      color:#334155;
      font-size:13px;
      line-height:1.5;
      display:none;
    }
    .upload-meta.show{
      display:block;
    }
    .check{
      display:flex;
      gap:10px;
      align-items:flex-start;
      margin:12px 0 4px;
      color:#334155;
      font-size:13px;
      line-height:1.55;
    }
    .check input{
      margin-top:2px;
    }
    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .15s ease, opacity .15s ease;
      text-decoration:none;
    }
    .btn:active{
      transform:scale(.985);
    }
    .btn-primary{
      background:var(--primary);
      color:#fff;
    }
    .btn-soft{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn[disabled]{
      opacity:.65;
      cursor:not-allowed;
    }
    .notice{
      display:none;
      margin-top:14px;
      padding:14px 16px;
      border-radius:18px;
      font-size:13px;
      line-height:1.55;
      border:1px solid transparent;
      white-space:pre-line;
    }
    .notice.show{display:block}
    .notice.info{
      background:#eff6ff;
      border-color:#bfdbfe;
      color:#1d4ed8;
    }
    .notice.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#b91c1c;
    }
    .notice.success{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }
    .footer{
      text-align:center;
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      background:#f8fafc;
      color:#475569;
      border:1px solid var(--line);
      font-size:12px;
      margin-bottom:14px;
    }
    @media (max-width:460px){
      .grid-2,.btn-row{grid-template-columns:1fr}
    }
  
    .app-alert{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:9999;background:rgba(15,23,42,.46);backdrop-filter:blur(4px)}
    .app-alert.show{display:flex}
    .app-alert-card{width:min(100%,360px);background:#fff;border:1px solid rgba(255,255,255,.75);box-shadow:0 30px 60px rgba(15,23,42,.20);border-radius:26px;padding:22px}
    .app-alert-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .app-alert-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:#fff7ed;color:#c2410c;font-size:20px;flex:0 0 auto;border:1px solid #fed7aa}
    .app-alert-title{margin:0;font-size:18px;letter-spacing:-.03em}
    .app-alert-message{margin:0;color:var(--muted);font-size:14px;line-height:1.65;white-space:pre-line}
    .app-alert-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .app-alert-cancel{min-width:92px;border:1px solid var(--line);border-radius:16px;padding:12px 16px;background:#fff;color:var(--text);font-weight:800;cursor:pointer}
    .app-alert-confirm{min-width:92px;border:none;border-radius:16px;padding:12px 16px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer}
    .app-alert-confirm{min-width:92px;border:none;border-radius:16px;padding:12px 16px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer}
    

/* 상단 로딩바 */
.top-loader{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  width:0;
  background:linear-gradient(90deg,#ef4444,#f59e0b);
  z-index:9999;
  opacity:1;
  transition:width .35s ease, opacity .35s ease;
}
.top-loader.active{width:78%}
.top-loader.done{width:100%;opacity:0}


/* ===== 전체 화면 로더 ===== */
.page-loader{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,.52);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  z-index:10000;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .22s ease, visibility .22s ease;
}
.page-loader.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}
.loader-mark{
  position:relative;
  width:74px;
  height:74px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.loader-mark .arm{
  position:absolute;
  left:50%;
  top:50%;
  width:10px;
  border-radius:999px;
  transform-origin:center center;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
.loader-mark .arm.top{
  height:34px;
  background:#ffffff;
  transform:translate(-50%,-72%) rotate(45deg);
}
.loader-mark .arm.left{
  height:34px;
  background:#ffffff;
  transform:translate(-50%,-72%) rotate(-45deg);
}
.loader-mark .arm.mid{
  width:42px;
  height:8px;
  background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);
  transform:translate(-50%,-2px);
}
.loader-mark .arm.bot{
  width:42px;
  height:8px;
  background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);
  transform:translate(-50%,12px);
}
.loader-mark .arm.bot2{
  width:42px;
  height:8px;
  background:linear-gradient(90deg,#ff4fc3 0%, #ff63d8 100%);
  transform:translate(-50%,26px);
}
.loader-mark{
  animation:loaderFloat .95s ease-in-out infinite;
}
.page-loader.show .loader-mark{
  animation:loaderFloat .95s ease-in-out infinite, loaderPulse .9s ease-in-out infinite;
}
@keyframes loaderFloat{
  0%,100%{ transform:translateY(0) scale(1); }
  50%{ transform:translateY(-3px) scale(1.03); }
}
@keyframes loaderPulse{
  0%{ opacity:.88; }
  50%{ opacity:1; }
  100%{ opacity:.9; }
}

</style>
</head>
<body>
    <div class="wrap">
    <section class="hero">
      <div class="eyebrow">📝 입주민 회원가입</div>
      <h1>더운정 마이힐스<br>회원가입</h1>
      <p>입주민 인증 후 승인되면 다양한 서비스 이용이 가능합니다.</p>
    </section>

    <section class="panel">
      <div class="brand">
        <div class="logo">🏢</div>
        <div>
          <h2>가입 신청서</h2>
          <p>입주민 인증 후 이용 가능한 서비스입니다</p>
        </div>
      </div>

      <div class="pill" id="statusPill">회원가입 신청 후 관리자의 승인 절차가 진행됩니다.</div>

      <div id="resubmitCard" class="notice error" style="display:none; margin-top:0; margin-bottom:14px;"></div>

      <form id="signupForm">
        <div class="field">
          <label for="email">이메일 주소</label>
          <input id="email" class="input" type="email" inputmode="email" autocomplete="email" placeholder="example@email.com" />
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" class="input" type="password" autocomplete="new-password" placeholder="6자 이상 입력" />
          </div>

          <div class="field">
            <label for="passwordConfirm">비밀번호 확인</label>
            <input id="passwordConfirm" class="input" type="password" autocomplete="new-password" placeholder="비밀번호 다시 입력" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="name">성명</label>
            <input id="name" class="input" type="text" autocomplete="name" placeholder="홍길동" />
          </div>

          <div class="field">
            <label for="nickname">닉네임</label>
            <input id="nickname" class="input" type="text" placeholder="앱에서 표시될 이름" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="building">동</label>
            <input id="building" class="input" type="text" inputmode="numeric" placeholder="예: 101" />
          </div>

          <div class="field">
            <label for="unit">호수</label>
            <input id="unit" class="input" type="text" inputmode="numeric" placeholder="예: 1203" />
          </div>
        </div>

        <div class="field">
          <label for="intro">간단한 자기소개</label>
          <textarea id="intro" class="textarea" placeholder="간단한 소개나 가입 목적을 적어주세요."></textarea>
          <div class="helper">예: 안녕하세요. 104동 입주민입니다. 혜택 정보를 자주 확인하고 싶어 가입 신청합니다.</div>
        </div>

        <div class="field">
          <label for="residentProof">입주민 인증 사진 업로드</label>
          <div class="upload-box">
            <input id="residentProof" class="input" type="file" accept="image/*" />
            <div class="helper">
              입주민 확인을 위해 <strong>동·호수</strong>가 보이는 화면을 캡처하여 업로드해 주세요.
            </div>
            <div id="fileMeta" class="upload-meta"></div>
            <div id="existingProofMeta" class="upload-meta"></div>
          </div>
        </div>

        <label class="check">
          <input id="agreePrivacy" type="checkbox" />
          <span>입주민 인증, 승인 심사 및 서비스 이용을 위해 제출한 정보를 저장하고 검토하는 데 동의합니다.</span>
        </label>

        <label class="check">
          <input id="agreePolicy" type="checkbox" />
          <span>허위 정보 제출 시 가입이 거절되거나 계정이 제한될 수 있음에 동의합니다.</span>
        </label>

        <div class="btn-row">
          <button id="submitBtn" class="btn btn-primary" type="submit">회원가입 신청</button>
          <a class="btn btn-soft" href="./index.html" id="goLoginLink">로그인으로 이동</a>
        </div>
      </form>

      <div id="notice" class="notice info"></div>
    </section>

    <div class="footer">
      가입 신청 후 승인 완료 시 서비스 이용이 가능합니다.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDhKr7oMSrLowJ47cqB4pvNXuIIdtW0HPI",
      authDomain: "sola-home-4979a.firebaseapp.com",
      projectId: "sola-home-4979a",
      storageBucket: "sola-home-4979a.firebasestorage.app",
      messagingSenderId: "337132471819",
      appId: "1:337132471819:web:848cd357fecda459a2e90e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    document.body.style.opacity = '0';

    const qs = (selector) => document.querySelector(selector);

    const form = qs('#signupForm');
    const submitBtn = qs('#submitBtn');
    const noticeEl = qs('#notice');
    const fileInput = qs('#residentProof');
    const fileMeta = qs('#fileMeta');
    const existingProofMeta = qs('#existingProofMeta');
    const statusPill = qs('#statusPill');
    const resubmitCard = qs('#resubmitCard');

    let loadingCount = 0;
    let currentRejectedUser = null;
    let currentRejectedUserData = null;
    let isResubmitMode = false;
    let isProcessingSignup = false;

    function startLoading(){
      const pageLoader = document.getElementById('pageLoader');
      if (!pageLoader) return;
      loadingCount += 1;
      pageLoader.classList.add('show');
      pageLoader.setAttribute('aria-hidden', 'false');
    }

    function finishLoading(callback){
      const pageLoader = document.getElementById('pageLoader');
      loadingCount = Math.max(loadingCount - 1, 0);

      if (!pageLoader){
        if (typeof callback === 'function') callback();
        return;
      }

      if (loadingCount > 0) {
        if (typeof callback === 'function') callback();
        return;
      }

      pageLoader.classList.remove('show');
      pageLoader.setAttribute('aria-hidden', 'true');

      if (typeof callback === 'function') {
        setTimeout(() => callback(), 40);
      }
    }
    const alertEl = qs('#appAlert');
    const alertMsgEl = qs('#appAlertMessage');
    const alertTitleEl = qs('#appAlertTitle');
    const alertIconEl = qs('#appAlertIcon');
    const alertConfirmEl = qs('#appAlertConfirm');
    const alertCancelEl = qs('#appAlertCancel');
    let alertFocusTarget = null;
    let alertResolver = null;
    let alertMode = 'alert';

    function openModalBase({
      title='안내',
      message='',
      focusTarget=null,
      mode='alert',
      confirmText='확인',
      cancelText='취소',
      icon='⚠️'
    } = {}){
      alertMode = mode;
      alertFocusTarget = focusTarget;
      alertTitleEl.textContent = title;
      alertMsgEl.textContent = message;
      alertIconEl.textContent = icon;
      alertConfirmEl.textContent = confirmText;
      alertCancelEl.textContent = cancelText;
      alertCancelEl.classList.toggle('hidden', mode !== 'confirm');
      alertEl.classList.add('show');
      alertEl.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => {
        (mode === 'confirm' ? alertCancelEl : alertConfirmEl).focus();
      });
      return new Promise((resolve) => {
        alertResolver = resolve;
      });
    }

    function openModalAlert(message, focusTarget=null, title='안내'){
      return openModalBase({ title, message, focusTarget, mode:'alert', confirmText:'확인', icon:'⚠️' });
    }

    function openModalConfirm(message, focusTarget=null, title='확인', confirmText='확인', cancelText='취소'){
      return openModalBase({ title, message, focusTarget, mode:'confirm', confirmText, cancelText, icon:'❓' });
    }

    function closeModal(result=false){
      alertEl.classList.remove('show');
      alertEl.setAttribute('aria-hidden', 'true');
      if(result === false && alertFocusTarget){ alertFocusTarget.focus(); }
      const resolver = alertResolver;
      alertResolver = null;
      if(resolver) resolver(result);
    }

    alertConfirmEl.addEventListener('click', () => closeModal(true));
    alertCancelEl.addEventListener('click', () => closeModal(false));
    alertEl.addEventListener('click', (event) => {
      if(event.target === alertEl) closeModal(false);
    });
    window.addEventListener('keydown', (event) => {
      if(!alertEl.classList.contains('show')) return;
      if(event.key === 'Escape') closeModal(false);
    });
function showNotice(message, type='info'){
      noticeEl.className = `notice show ${type}`;
      noticeEl.textContent = message;
    }

    function hideNotice(){
      noticeEl.className = 'notice info';
      noticeEl.textContent = '';
    }

    function setLoading(isLoading){
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? '처리 중...' : '회원가입 신청';
    }

    function normalizeEmail(value=''){
      return String(value).trim().toLowerCase();
    }

    function sanitizeFileName(name='file'){
      return String(name).replace(/[^\w.\-가-힣]/g, '_');
    }

    function resetExistingProofMeta(){
      existingProofMeta.className = 'upload-meta';
      existingProofMeta.textContent = '';
    }

    function setResubmitMode(user, userData){
      currentRejectedUser = user;
      currentRejectedUserData = userData || {};
      isResubmitMode = true;

      statusPill.textContent = '반려된 신청 정보를 수정한 뒤 다시 신청할 수 있습니다.';
      resubmitCard.style.display = 'block';
      resubmitCard.className = 'notice show error';
      resubmitCard.textContent = `이전 신청이 반려되었습니다.\n사유: ${currentRejectedUserData.rejectReason || '반려 사유가 등록되지 않았습니다.'}\n내용을 수정한 뒤 다시 신청해 주세요.`;

      qs('#email').value = currentRejectedUserData.email || user.email || '';
      qs('#email').disabled = true;
      qs('#name').value = currentRejectedUserData.name || '';
      qs('#nickname').value = currentRejectedUserData.nickname || '';
      qs('#building').value = currentRejectedUserData.building || '';
      qs('#unit').value = currentRejectedUserData.unit || '';
      qs('#intro').value = currentRejectedUserData.intro || '';

      qs('#password').value = '';
      qs('#passwordConfirm').value = '';
      qs('#password').disabled = true;
      qs('#passwordConfirm').disabled = true;
      qs('#password').closest('.field').style.display = 'none';
      qs('#passwordConfirm').closest('.field').style.display = 'none';

      qs('#agreePrivacy').checked = true;
      qs('#agreePolicy').checked = true;

      submitBtn.textContent = '수정 후 재신청';

      if (currentRejectedUserData.residentProofFileName) {
        existingProofMeta.className = 'upload-meta show';
        existingProofMeta.textContent = `기존 인증 파일: ${currentRejectedUserData.residentProofFileName}\n새 파일을 선택하지 않으면 기존 파일이 유지됩니다.`;
      } else {
        resetExistingProofMeta();
      }
    }

    function clearResubmitMode(){
      currentRejectedUser = null;
      currentRejectedUserData = null;
      isResubmitMode = false;

      statusPill.textContent = '회원가입 신청 후 관리자의 승인 절차가 진행됩니다.';
      resubmitCard.className = 'notice error';
      resubmitCard.style.display = 'none';
      resubmitCard.textContent = '';

      qs('#email').disabled = false;
      qs('#password').disabled = false;
      qs('#passwordConfirm').disabled = false;
      qs('#password').closest('.field').style.display = '';
      qs('#passwordConfirm').closest('.field').style.display = '';

      submitBtn.textContent = '회원가입 신청';
      resetExistingProofMeta();
    }

    onAuthStateChanged(auth, async (user) => {
      document.body.style.opacity = '1';

      if (!user) {
        clearResubmitMode();
        finishLoading();
        return;
      }

      startLoading();

      try {
        const userSnap = await getDoc(doc(db, 'users', user.uid));

        if (!userSnap.exists()) {
          if (isProcessingSignup) {
            finishLoading();
            return;
          }

          await signOut(auth);
          clearResubmitMode();
          finishLoading();
          return;
        }

        const userData = userSnap.data() || {};
        const approvalStatus = userData.approvalStatus || 'pending';
        const accountStatus = userData.accountStatus || 'active';

        if (accountStatus === 'withdrawn') {
          await signOut(auth);
          clearResubmitMode();
          finishLoading();
          showNotice('탈퇴 처리된 계정입니다. 복구가 필요하면 관리자에게 문의해 주세요.', 'error');
          return;
        }

        if (approvalStatus === 'approved' && accountStatus === 'active') {
          setTimeout(() => {
            window.location.replace('./app.html');
          }, 80);
          return;
        }

        if (approvalStatus === 'rejected' && accountStatus === 'active') {
          setResubmitMode(user, userData);
          finishLoading();
          return;
        }

        await signOut(auth);
        clearResubmitMode();
        finishLoading();

        if (approvalStatus === 'resubmitted') {
          showNotice('수정 후 재신청이 접수되었습니다. 관리자 재검토 후 로그인할 수 있습니다.', 'info');
        } else {
          showNotice('현재 계정은 승인 대기 상태입니다. 관리자 승인 후 로그인할 수 있습니다.', 'info');
        }
      } catch (error) {
        console.error('승인 상태 확인 실패:', error);
        await signOut(auth).catch(() => {});
        clearResubmitMode();
        finishLoading();
        showNotice('승인 상태를 확인할 수 없습니다. 잠시 후 다시 시도해 주세요.', 'error');
      }
    });

    qs('#goLoginLink').addEventListener('click', async (event) => {
      const hasTypedValue = ['#email','#password','#passwordConfirm','#name','#nickname','#building','#unit','#intro'].some((selector) => String(qs(selector).value || '').trim());
      const hasFile = !!fileInput.files?.[0];
      const hasChecked = qs('#agreePrivacy').checked || qs('#agreePolicy').checked;
      if (!hasTypedValue && !hasFile && !hasChecked) return;
      event.preventDefault();
      const confirmed = await openModalConfirm('작성 중인 내용이 있다면 저장되지 않습니다. 로그인 페이지로 이동할까요?', qs('#goLoginLink'), '페이지 이동', '이동', '계속 작성');
      if (confirmed) {
        startLoading();
        if (auth.currentUser) {
          await signOut(auth).catch(() => {});
        }
        setTimeout(() => {
          window.location.href = './index.html';
        }, 80);
      }
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files?.[0];
      if (!file) {
        fileMeta.className = 'upload-meta';
        fileMeta.textContent = '';
        if (isResubmitMode && currentRejectedUserData?.residentProofFileName) {
          existingProofMeta.className = 'upload-meta show';
          existingProofMeta.textContent = `기존 인증 파일: ${currentRejectedUserData.residentProofFileName}\n새 파일을 선택하지 않으면 기존 파일이 유지됩니다.`;
        }
        return;
      }
      const sizeMB = (file.size / 1024 / 1024).toFixed(2);
      fileMeta.className = 'upload-meta show';
      fileMeta.textContent = `선택 파일: ${file.name}\n용량: ${sizeMB}MB`;

      if (isResubmitMode) {
        existingProofMeta.className = 'upload-meta show';
        existingProofMeta.textContent = '새 인증 파일로 교체하여 재신청합니다.';
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideNotice();

      const emailEl = qs('#email');
      const passwordEl = qs('#password');
      const passwordConfirmEl = qs('#passwordConfirm');
      const nameEl = qs('#name');
      const nicknameEl = qs('#nickname');
      const buildingEl = qs('#building');
      const unitEl = qs('#unit');
      const agreePrivacyEl = qs('#agreePrivacy');
      const agreePolicyEl = qs('#agreePolicy');

      const email = normalizeEmail(emailEl.value);
      const password = passwordEl.value;
      const passwordConfirm = passwordConfirmEl.value;
      const name = nameEl.value.trim();
      const nickname = nicknameEl.value.trim();
      const building = buildingEl.value.trim();
      const unit = unitEl.value.trim();
      const intro = qs('#intro').value.trim();
      const agreePrivacy = agreePrivacyEl.checked;
      const agreePolicy = agreePolicyEl.checked;
      const proofFile = fileInput.files?.[0];

      const fail = async (message, element) => {
        showNotice(message, 'error');
        await openModalAlert(message, element);
      };

      if (!email) {
        await fail('이메일을 입력해주세요.', emailEl);
        return;
      }

      if (!isResubmitMode && !password) {
        await fail('비밀번호를 입력해주세요.', passwordEl);
        return;
      }

      if (!isResubmitMode && !passwordConfirm) {
        await fail('비밀번호 확인을 입력해주세요.', passwordConfirmEl);
        return;
      }

      if (!name) {
        await fail('성명을 입력해주세요.', nameEl);
        return;
      }

      if (!nickname) {
        await fail('닉네임을 입력해주세요.', nicknameEl);
        return;
      }

      if (!building) {
        await fail('동을 입력해주세요.', buildingEl);
        return;
      }

      if (!unit) {
        await fail('호수를 입력해주세요.', unitEl);
        return;
      }

      if (!isResubmitMode && password.length < 6) {
        await fail('비밀번호는 6자 이상이어야 합니다.', passwordEl);
        return;
      }

      if (!isResubmitMode && password !== passwordConfirm) {
        await fail('비밀번호와 비밀번호 확인이 일치하지 않습니다.', passwordConfirmEl);
        return;
      }

      if (!proofFile && !isResubmitMode) {
        await fail('입주민 인증 사진을 업로드해 주세요.', fileInput);
        return;
      }

      if (!agreePrivacy) {
        await fail('개인정보 수집 및 검토 동의가 필요합니다.', agreePrivacyEl);
        return;
      }

      if (!agreePolicy) {
        await fail('허위 정보 제출 관련 동의가 필요합니다.', agreePolicyEl);
        return;
      }

      isProcessingSignup = true;
      setLoading(true);
      startLoading();

      try {
        if (isResubmitMode && currentRejectedUser) {
          let proofPayload = {
            residentProofUrl: currentRejectedUserData?.residentProofUrl || '',
            residentProofPath: currentRejectedUserData?.residentProofPath || '',
            residentProofFileName: currentRejectedUserData?.residentProofFileName || '',
            residentProofExtension: currentRejectedUserData?.residentProofExtension || ''
          };

          if (proofFile) {
            await currentRejectedUser.getIdToken(true);

            const ext = proofFile.name.includes('.') ? proofFile.name.split('.').pop() : 'jpg';
            const safeFileName = sanitizeFileName(`${Date.now()}_${proofFile.name}`);
            const storageRef = ref(storage, `resident-proofs/${currentRejectedUser.uid}/${safeFileName}`);
            await uploadBytes(storageRef, proofFile);
            const proofUrl = await getDownloadURL(storageRef);

            proofPayload = {
              residentProofUrl: proofUrl,
              residentProofPath: storageRef.fullPath,
              residentProofFileName: proofFile.name,
              residentProofExtension: ext
            };
          }

          await updateProfile(currentRejectedUser, {
            displayName: nickname
          });

          await updateDoc(doc(db, 'users', currentRejectedUser.uid), {
            email,
            name,
            nickname,
            building,
            unit,
            intro,
            ...proofPayload,
            approvalStatus: 'resubmitted',
            accountStatus: 'active',
            rejectReason: '',
            rejectedAt: null,
            rejectedBy: '',
            rejectType: '',
            resubmittedAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          await signOut(auth);

          finishLoading();
          showNotice('수정 후 재신청이 완료되었습니다. 관리자의 재검토 후 로그인이 가능합니다.', 'success');
          await new Promise(resolve => setTimeout(resolve, 60));
          await openModalAlert('재신청이 완료되었습니다. 관리자가 확인 후 로그인이 가능합니다.');
          form.reset();
          clearResubmitMode();
          fileMeta.className = 'upload-meta';
          fileMeta.textContent = '';
          return;
        }

        const credential = await createUserWithEmailAndPassword(auth, email, password);
        const user = credential.user;

        await updateProfile(user, {
          displayName: nickname
        });

        await user.getIdToken(true);

        const ext = proofFile.name.includes('.') ? proofFile.name.split('.').pop() : 'jpg';
        const safeFileName = sanitizeFileName(`${Date.now()}_${proofFile.name}`);
        const storageRef = ref(storage, `resident-proofs/${user.uid}/${safeFileName}`);
        await uploadBytes(storageRef, proofFile);
        const proofUrl = await getDownloadURL(storageRef);

        await setDoc(doc(db, 'users', user.uid), {
          uid: user.uid,
          email,
          name,
          nickname,
          building,
          unit,
          intro,
          residentProofUrl: proofUrl,
          residentProofPath: storageRef.fullPath,
          residentProofFileName: proofFile.name,
          residentProofExtension: ext,
          approvalStatus: 'pending',
          accountStatus: 'active',
          rejectReason: '',
          rejectedAt: null,
          rejectedBy: '',
          approvedAt: null,
          approvedBy: '',
          resubmittedAt: null,
          withdrawnAt: null,
          withdrawnBy: '',
          withdrawReason: '',
          restoredAt: null,
          restoredBy: '',
          restoreReason: '',
          role: 'resident',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        await signOut(auth);

        finishLoading();
        showNotice(`회원가입 신청이 완료되었습니다.
관리자가 승인 후 로그인이 가능합니다.`, 'success');
        await new Promise(resolve => setTimeout(resolve, 60));
        await openModalAlert('회원가입 신청이 완료되었습니다. 관리자가 승인 후 로그인이 가능합니다.');
        form.reset();
        clearResubmitMode();
        fileMeta.className = 'upload-meta';
        fileMeta.textContent = '';
      } catch (error) {
        const code = error?.code || '';
        let message = '회원가입 처리 중 오류가 발생했습니다. 다시 시도해 주세요.';
        let focusTarget = qs('#email');

        if (code === 'auth/email-already-in-use') {
          message = '이미 가입된 이메일입니다.';
          focusTarget = qs('#email');
        } else if (code === 'auth/invalid-email') {
          message = '이메일 형식이 올바르지 않습니다.';
          focusTarget = qs('#email');
        } else if (code === 'auth/weak-password') {
          message = '비밀번호가 너무 약합니다. 더 안전한 비밀번호를 사용해 주세요.';
          focusTarget = qs('#password');
        } else if (code === 'storage/unauthorized') {
          message = '인증 사진 업로드 권한이 없습니다. Storage 규칙을 확인해 주세요.';
          focusTarget = fileInput;
        } else if (code === 'permission-denied') {
          message = '회원 정보 저장 권한이 없습니다. Firestore 규칙을 확인해 주세요.';
          focusTarget = qs('#name');
        } else if (code === 'auth/network-request-failed') {
          message = '네트워크 연결을 확인해 주세요.';
          focusTarget = qs('#email');
        }

        finishLoading();
        showNotice(message, 'error');
        await new Promise(resolve => setTimeout(resolve, 60));
        await openModalAlert(message, focusTarget);
      } finally {
        isProcessingSignup = false;
        loadingCount = 0;
        setLoading(false);
      }
    });
  </script>

  <div class="app-alert" id="appAlert" aria-hidden="true">
    <div class="app-alert-card" role="alertdialog" aria-modal="true" aria-labelledby="appAlertTitle" aria-describedby="appAlertMessage">
      <div class="app-alert-head">
        <div class="app-alert-icon" id="appAlertIcon">⚠️</div>
        <h3 class="app-alert-title" id="appAlertTitle">안내</h3>
      </div>
      <p class="app-alert-message" id="appAlertMessage"></p>
      <div class="app-alert-actions">
        <button class="app-alert-cancel hidden" id="appAlertCancel" type="button">취소</button>
        <button class="app-alert-confirm" id="appAlertConfirm" type="button">확인</button>
      </div>
    </div>
  </div>


  <div id="pageLoader" class="page-loader" aria-hidden="true">
    <div class="loader-mark" aria-label="로딩 중" role="status">
      <span class="arm top"></span>
      <span class="arm left"></span>
      <span class="arm mid"></span>
      <span class="arm bot"></span>
      <span class="arm bot2"></span>
    </div>
  </div>

</body>

</html>
